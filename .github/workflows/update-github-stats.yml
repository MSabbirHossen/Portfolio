name: Update GitHub Stats

on:
  workflow_dispatch:

  schedule:
    - cron: '0 */6 * * *'

    # If you ever become more active on GitHub and want fresher data, you could switch to every 3 hours:
# schedule:
# - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run update-stats
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit updated stats
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add public/stats.json

          git diff --cached --quiet || git commit -m "Update GitHub stats"

          git push
